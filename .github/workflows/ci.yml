name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/operate/panel/package-lock.json

      - name: Install shell tooling
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt jq ruby

      - name: Verify repository
        run: ./scripts/verify.sh
